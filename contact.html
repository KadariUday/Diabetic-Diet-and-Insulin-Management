<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — DiabCare+</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

  <!-- Header will be injected by JavaScript -->
  <header id="main-header" class="site-header"></header>

  <main class="container page">
    <h1>Contact & Feedback</h1>
    <p class="muted">Send us a message. Your feedback is saved to our database.</p>
    <div class="card">
      <form id="contactForm">
        <label>Name<input id="cname" required></label>
        <label>Email<input id="cemail" type="email" required></label>
        <label>Message<textarea id="cmessage" rows="4" required></textarea></label>
        <div class="form-actions"><button class="btn" type="submit">Send</button></div>
      </form>
    </div>

    <div id="message-box" class="message-box hidden"></div>
  </main>

  <!-- Footer will be injected by JavaScript -->
  <footer id="main-footer" class="site-footer"></footer>

  <script src="js/main.js"></script>
</body>

</html>

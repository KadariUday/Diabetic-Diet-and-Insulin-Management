<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Diet Planner — DiabCare+</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Header will be injected by JavaScript -->
  <header id="main-header" class="site-header"></header>

  <main class="container page">
    <h1>Diet Planner</h1>
    <p class="muted">Enter basic info to generate a guideline-based meal plan. Log in to save your results to your
      dashboard.</p>

    <div class="card form-card">
      <form id="dietForm">
        <div class="grid-2">
          <label>Age
            <div class="range-container">
              <input id="age" type="range" min="1" max="100" value="30" required>
              <span class="range-value">30</span>
            </div>
          </label>
          <label>Weight (kg)
            <div class="range-container">
              <input id="weight" type="range" min="20" max="200" value="70" required>
              <span class="range-value">70</span>
            </div>
          </label>
        </div>
        <div class="grid-2">
          <label>Current Glucose (mg/dL)
            <div class="range-container">
              <input id="glucose" type="range" min="30" max="400" value="100" required>
              <span class="range-value">100</span>
            </div>
          </label>
          <label>Activity Level
            <select id="activity">
              <option value="1.2">Sedentary</option>
              <option value="1.4">Light</option>
              <option value="1.6" selected>Moderate</option>
              <option value="1.8">Active</option>
            </select>
          </label>
        </div>
        <div class="form-actions">
          <button class="btn" type="submit">Generate Plan</button>
          <button class="btn btn-outline" id="downloadDiet" type="button">Download Report</button>
        </div>
      </form>
    </div>

    <div id="message-box" class="message-box hidden"></div>

    <div id="dietResult" class="card result-card hidden">
      <h2>Suggested Daily Plan</h2>
      <p id="summary"></p>
      <div id="meals" class="meals-grid"></div>
      <p class="disclaimer muted">For educational demonstration only. Consult a dietitian.</p>
    </div>
  </main>

  <!-- Footer will be injected by JavaScript -->
  <footer id="main-footer" class="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/main.js"></script>
</body>

</html>

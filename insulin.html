<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Insulin Calculator — DiabCare+</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

  <!-- Header will be injected by JavaScript -->
  <header id="main-header" class="site-header"></header>

  <main class="container page">
    <h1>Insulin Dose Calculator</h1>
    <p class="muted">Estimate insulin dose. Log in to save your calculations to your dashboard.</p>

    <div class="card form-card">
      <form id="insulinForm">
        <div class="grid-2">
          <label>Current Glucose (mg/dL)
            <div class="range-container">
              <input id="curBG" type="range" min="20" max="400" value="150" required>
              <span class="range-value">150</span>
            </div>
          </label>
          <label>Carbs (g)
            <div class="range-container">
              <input id="carbs" type="range" min="0" max="200" value="0" required>
              <span class="range-value">0</span>
            </div>
          </label>
        </div>
        <div class="grid-2">
          <label>Target Glucose (mg/dL)
            <div class="range-container">
              <input id="targetBG" type="range" min="50" max="200" value="110" required>
              <span class="range-value">110</span>
            </div>
          </label>
          <label>ISF (mg/dL per unit)
            <div class="range-container">
              <input id="isf" type="range" min="1" max="100" value="50" required>
              <span class="range-value">50</span>
            </div>
          </label>
        </div>
        <div class="grid-2">
          <label>ICR (g per unit)
            <div class="range-container">
              <input id="icr" type="range" min="1" max="50" value="12" required>
              <span class="range-value">12</span>
            </div>
          </label>
          <div></div>
        </div>
        <div class="form-actions">
          <button class="btn" type="submit">Calculate</button>
          <button class="btn btn-outline" id="clearInsulin" type="button">Reset</button>
        </div>
      </form>
    </div>

    <div id="message-box" class="message-box hidden"></div>

    <div id="insulinResult" class="card result-card hidden">
      <h2>Estimated Dose</h2>
      <p id="doseText"></p>
      <p class="disclaimer muted">This is an estimate. Confirm clinically.</p>
    </div>
  </main>

  <!-- Footer will be injected by JavaScript -->
  <footer id="main-footer" class="site-footer"></footer>

  <script src="js/main.js"></script>
</body>

</html>

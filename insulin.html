<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Insulin Calculator — DiabCare+</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Header will be injected by JavaScript -->
  <header id="main-header" class="site-header"></header>

  <main class="container page">
    <h1>Insulin Dose Calculator</h1>
    <p class="muted">Estimate insulin dose. Log in to save your calculations to your dashboard.</p>

    <div class="card form-card">
      <form id="insulinForm">
        <div class="grid-2">
          <label>Current Glucose (mg/dL)<input id="curBG" type="number" min="20" required></label>
          <label>Carbs (g)<input id="carbs" type="number" min="0" value="0" required></label>
        </div>
        <div class="grid-2">
          <label>Target Glucose (mg/dL)<input id="targetBG" type="number" min="50" value="110" required></label>
          <label>ISF (mg/dL per unit)<input id="isf" type="number" min="1" value="50" required></label>
        </div>
        <div class="grid-2">
          <label>ICR (g per unit)<input id="icr" type="number" min="1" value="12" required></label>
          <div></div>
        </div>
        <div class="form-actions">
          <button class="btn" type="submit">Calculate</button>
          <button class="btn btn-outline" id="clearInsulin" type="button">Reset</button>
        </div>
      </form>
    </div>

    <div id="message-box" class="message-box hidden"></div>

    <div id="insulinResult" class="card result-card hidden">
      <h2>Estimated Dose</h2>
      <p id="doseText"></p>
      <p class="disclaimer muted">This is an estimate. Confirm clinically.</p>
    </div>
  </main>

  <!-- Footer will be injected by JavaScript -->
  <footer id="main-footer" class="site-footer"></footer>

  <script src="js/main.js"></script>
</body>

</html>

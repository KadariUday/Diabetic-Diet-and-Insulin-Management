<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Health Tips — DiabCare+</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Header will be injected by JavaScript -->
  <header id="main-header" class="site-header"></header>

  <main class="container page">
    <h1>Daily Health Tips</h1>
    <div class="card tip-card">
      <div id="tipText" class="tip-text"></div>
      <div class="tip-controls">
        <button id="prevTip" class="btn btn-small">Prev</button>
        <button id="nextTip" class="btn btn-small">Next</button>
      </div>
    </div>

    <section class="more-tips">
      <h2>Quick tips</h2>
      <ul class="muted">
        <li>Monitor glucose regularly and keep a log.</li>
        <li>Prefer whole grains and high-fiber foods.</li>
        <li>Stay hydrated and avoid sugary drinks.</li>
        <li>Consult your doctor before adjusting insulin.</li>
      </ul>
    </section>
  </main>

  <!-- Footer will be injected by JavaScript -->
  <footer id="main-footer" class="site-footer"></footer>

  <script src="js/main.js"></script>
</body>

</html>
